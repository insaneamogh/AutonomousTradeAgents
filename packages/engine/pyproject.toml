[project]
name = "engine"
version = "0.0.1"
description = "Deterministic engine: backtester, risk, position sizer, reconciler. Pure Python, no LLM."
requires-python = ">=3.12"
dependencies = [
  "pydantic>=2.9.0",
  "pandas>=2.2.0",
  "numpy>=1.26.0",
  "pandas-ta>=0.3.14b1",
  "sqlalchemy[asyncio]>=2.0.35",
  "asyncpg>=0.30.0",
  "broker",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.uv.sources]
broker = { workspace = true }

[tool.hatch.build.targets.wheel]
packages = ["engine"]
