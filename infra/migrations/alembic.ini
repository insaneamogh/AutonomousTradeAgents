# Alembic config.
#
# script_location + prepend_sys_path use %(here)s — the directory of THIS
# ini file — NOT a bare `.` (which alembic resolves relative to the current
# working directory). This matters because the Docker/Railway entrypoint
# runs `alembic -c /app/infra/migrations/alembic.ini upgrade head` from CWD
# `/app`; with a bare `.` alembic would look for versions/ + env.py in `/app`
# and crash. %(here)s makes migrations work from ANY working directory.
[alembic]
script_location = %(here)s
sqlalchemy.url = postgresql+asyncpg://app:app@localhost:5432/trading_agent
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(slug)s
prepend_sys_path = %(here)s
version_path_separator = os

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
